        // --- Main App Logic ---

        function App() {
            const [file, setFile] = useState(null);
            const [previewOriginal, setPreviewOriginal] = useState(null);
            const [previewConverted, setPreviewConverted] = useState(null);
            // Changed default quality to 0.1 (10%)
            const [quality, setQuality] = useState(0.1);
            
            // Logo State
            const [logoData, setLogoData] = useState(null);
            const [showWatermark, setShowWatermark] = useState(true);
            
            const [isDragging, setIsDragging] = useState(false);
            const [isConverting, setIsConverting] = useState(false);

            const fileInputRef = useRef(null);
            const logoInputRef = useRef(null);
            const canvasRef = useRef(null);

            // Load saved logo from localStorage OR use Default
            useEffect(() => {
                const savedLogo = localStorage.getItem('mySavedLogo');
                if (savedLogo) {
                    setLogoData(savedLogo);
                }
            }, []);

            const formatSize = (bytes) => {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const result = ev.target.result;
                        setLogoData(result);
                        try {
                            localStorage.setItem('mySavedLogo', result);
                        } catch (err) {
                            console.warn("Logo too large to save to localStorage.");
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };

            const clearLogo = () => {
                setLogoData(null);
                localStorage.removeItem('mySavedLogo');
                if (logoInputRef.current) logoInputRef.current.value = "";
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const droppedFile = e.dataTransfer.files[0];
                if (droppedFile && droppedFile.type.startsWith('image/')) {
                    processFile(droppedFile);
                }
            };

            const processFile = (selectedFile) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    setFile(selectedFile);
                    setPreviewOriginal(e.target.result);
                    setPreviewConverted(null);
                };
                reader.readAsDataURL(selectedFile);
            };

            useEffect(() => {
                if (!file || !previewOriginal) return;

                const convertImage = async () => {
                    setIsConverting(true);

                    img.src = previewOriginal;
                    
                    await new Promise(resolve => { img.onload = resolve; });

                    const canvas = canvasRef.current;
                    if (!canvas) return;

                    const MIN_WIDTH = 1200;

let drawWidth = img.width;
let drawHeight = img.height;

if (img.width < MIN_WIDTH) {
    const scale = MIN_WIDTH / img.width;
    drawWidth = MIN_WIDTH;
    drawHeight = Math.round(img.height * scale);
}

canvas.width = drawWidth;
canvas.height = drawHeight;

const ctx = canvas.getContext('2d');
ctx.drawImage(img, 0, 0, drawWidth, drawHeight);


                    // --- Watermark Logic ---
                    // Use uploaded logo OR default logo
                    const activeLogo = logoData || CUSTOM_LOGO_BASE64;

                    if (showWatermark && activeLogo) {
                        try {
                            const logo = new Image();
                            
                            // For Base64 we DO NOT need crossOrigin
                            // logo.crossOrigin = "anonymous"; 
                            logo.src = activeLogo;
                            
                            // Wait for logo to load
                            await new Promise((resolve, reject) => {
                                logo.onload = resolve;
                                logo.onerror = (e) => {
                                    console.warn("Logo failed to load from URL.", e);
                                    resolve(); 
                                };
                            });

                            if (logo.complete && logo.naturalHeight !== 0) {
                                // Position: Bottom Right (matching the star reference)
                                // Size: 7% of image width (Little star size)
                                const logoWidth = canvas.width * 0.07;
								const scale = logoWidth / logo.width;
								const logoHeight = logo.height * scale;

								const margin = canvas.width * 0.02;

								const x = canvas.width - logoWidth - margin;
								const y = canvas.height - logoHeight - margin;

								ctx.drawImage(logo, x, y, logoWidth, logoHeight);


                                ctx.globalAlpha = 1.0; 
                                ctx.drawImage(logo, x, y, logoWidth, logoHeight);
                                ctx.globalAlpha = 1.0;
                            }
                        } catch (err) {
                            console.error("Error applying watermark:", err);
                        }
                    }
                    // -----------------------

                    // Use try-catch for conversion to catch "Tainted Canvas" errors
                    try {
                        canvas.toBlob((blob) => {
                            if (!blob) {
                                setIsConverting(false);
                                return;
                            }
                            
                            const convertedUrl = URL.createObjectURL(blob);
                            setPreviewConverted(convertedUrl);
                            
                            const savings = ((file.size - blob.size) / file.size * 100).toFixed(1);
                            setStats({
                                originalSize: file.size,
                                convertedSize: blob.size,
                                savings: savings > 0 ? savings : 0
                            });
                            
                            setIsConverting(false);
                        }, 'image/webp', quality);
                    } catch (e) {
                        console.error("Canvas Security Error", e);
                        alert("Error: The logo server prevented automated saving (CORS policy). Please upload the logo manually using the settings panel to fix this.");
                        setIsConverting(false);
                    }
                };

                const timer = setTimeout(convertImage, 100);
                return () => clearTimeout(timer);

            }, [previewOriginal, quality, file, showWatermark, logoData]);

            const handleDownload = () => {
                if (!previewConverted) return;
                const link = document.createElement('a');
                link.href = previewConverted;
                link.download = file.name.replace(/\.[^/.]+$/, "") + ".webp";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const reset = () => {
                setFile(null);
                setPreviewOriginal(null);
                setPreviewConverted(null);
                setStats({ originalSize: 0, convertedSize: 0, savings: 0 });
            };

            return (
                <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
                    <canvas ref={canvasRef} className="hidden" />

                    <div className="max-w-5xl mx-auto space-y-6">
                        <div className="text-center space-y-2 mb-8">
                            <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight">
                                PNG to WebP <span className="text-blue-600">Converter</span>
                            </h1>
                            <p className="text-slate-500 max-w-lg mx-auto">
                                Convert your images to modern WebP format securely in your browser. 
                            </p>
                        </div>

                        {!file ? (
                            <Card className={`
                                border-2 border-dashed transition-all duration-300
                                ${isDragging ? 'border-blue-500 bg-blue-50' : 'border-slate-300 hover:border-blue-400'}
                            `}>
                                <div 
                                    className="h-96 flex flex-col items-center justify-center cursor-pointer p-8 text-center"
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                    onDrop={handleDrop}
                                    onClick={() => fileInputRef.current?.click()}
                                >
                                    <div className={`
                                        p-6 rounded-full mb-6 transition-colors
                                        ${isDragging ? 'bg-blue-200 text-blue-700' : 'bg-slate-100 text-slate-400'}
                                    `}>
                                        <Upload size={48} />
                                    </div>
                                    <h3 className="text-xl font-semibold mb-2 text-slate-700">
                                        Drag & Drop your image here
                                    </h3>
                                    <p className="text-slate-500 mb-6">or click to browse files</p>
                                    <Button>Select Image</Button>
                                    <input 
                                        ref={fileInputRef}
                                        type="file" 
                                        className="hidden" 
                                        accept="image/png,image/jpeg,image/jpg"
                                        onChange={(e) => e.target.files?.[0] && processFile(e.target.files[0])}
                                    />
                                    <p className="mt-8 text-xs text-slate-400 uppercase tracking-widest font-semibold">
                                        Supports PNG, JPG, JPEG
                                    </p>
                                </div>
                            </Card>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="lg:col-span-1 space-y-6">
                                    <Card className="p-6 h-full flex flex-col">
                                        <div className="flex items-center justify-between mb-6">
                                            <h3 className="font-bold text-lg flex items-center gap-2">
                                                <Settings size={20} className="text-blue-600" />
                                                Settings
                                            </h3>
                                            <Button variant="ghost" onClick={reset} className="!p-2">
                                                <RefreshCw size={18} />
                                            </Button>
                                        </div>

                                        <div className="space-y-6 flex-grow">
                                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                                <div className="flex items-center gap-3 mb-2">
                                                    <div className="bg-white p-2 rounded shadow-sm text-blue-600">
                                                        <FileImage size={24} />
                                                    </div>
                                                    <div className="overflow-hidden">
                                                        <p className="font-medium truncate" title={file.name}>{file.name}</p>
                                                        <p className="text-xs text-slate-500">{formatSize(stats.originalSize)}</p>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Quality Control */}
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-center">
                                                    <label className="text-sm font-medium text-slate-700">Quality</label>
                                                    <span className="text-xs font-mono bg-blue-100 text-blue-700 px-2 py-1 rounded">
                                                        {Math.round(quality * 100)}%
                                                    </span>
                                                </div>
                                                <input
                                                    type="range"
                                                    min="0.1"
                                                    max="1.0"
                                                    step="0.05"
                                                    value={quality}
                                                    onChange={(e) => setQuality(parseFloat(e.target.value))}
                                                    className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                                />
                                                <div className="flex justify-between text-xs text-slate-400">
                                                    <span>Low Size</span>
                                                    <span>High Quality</span>
                                                </div>
                                            </div>

                                            {/* Watermark Section */}
                                            <div className="pt-4 border-t border-slate-100 space-y-4">
                                                <div className="flex items-center justify-between">
                                                    <div className="flex items-center gap-2">
                                                        <div className="bg-orange-100 p-1.5 rounded text-orange-600">
                                                            <Stamp size={16} />
                                                        </div>
                                                        <label className="text-sm font-medium text-slate-700">Logo</label>
                                                    </div>
                                                    <Toggle checked={showWatermark} onChange={setShowWatermark} />
                                                </div>
                                                
                                                {/* Logo Uploader */}
                                                {showWatermark && (
                                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 text-sm">
                                                        {logoData ? (
                                                            <div className="flex items-center justify-between">
                                                                <div className="flex items-center gap-2">
                                                                    <img src={logoData} alt="Logo" className="w-8 h-8 object-contain bg-white rounded border border-slate-200" />
                                                                    <span className="text-green-600 font-medium text-xs">Custom Logo Loaded</span>
                                                                </div>
                                                                <button onClick={clearLogo} className="text-red-500 hover:bg-red-50 p-1 rounded">
                                                                    <Trash2 size={16} />
                                                                </button>
                                                            </div>
                                                        ) : (
                                                            <div className="space-y-3">
                                                                <div className="flex items-center gap-2 p-2 bg-blue-50 border border-blue-100 rounded text-blue-800 text-xs">
                                                                    <span className="font-bold">Using Default:</span>
                                                                    <span className="truncate">marugujarat.in Logo</span>
                                                                </div>
                                                                
                                                                <div className="relative">
                                                                    <div className="absolute inset-0 flex items-center" aria-hidden="true">
                                                                        <div className="w-full border-t border-slate-200"></div>
                                                                    </div>
                                                                    <div className="relative flex justify-center">
                                                                        <span className="bg-slate-50 px-2 text-[10px] text-slate-400 uppercase">Or upload new</span>
                                                                    </div>
                                                                </div>

                                                                <input 
                                                                    ref={logoInputRef}
                                                                    type="file" 
                                                                    accept="image/*"
                                                                    onChange={handleLogoUpload}
                                                                    className="w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                                                                />
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>

                                            <div className="bg-green-50 border border-green-100 p-4 rounded-lg space-y-2 mt-4">
                                                <div className="flex justify-between text-sm">
                                                    <span className="text-green-700">New Size:</span>
                                                    <span className="font-bold text-green-800">{formatSize(stats.convertedSize)}</span>
                                                </div>
                                                <div className="flex justify-between text-sm">
                                                    <span className="text-green-700">Saved:</span>
                                                    <span className="font-bold text-green-800">{stats.savings}%</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-6 pt-6 border-t border-slate-100 space-y-3">
                                            <Button onClick={handleDownload} className="w-full justify-center py-3 text-lg" disabled={isConverting}>
                                                {isConverting ? (
                                                    <span className="animate-pulse">Processing...</span>
                                                ) : (
                                                    <>
                                                        <Download size={20} /> Download WebP
                                                    </>
                                                )}
                                            </Button>
                                            <Button onClick={reset} variant="secondary" className="w-full justify-center">
                                                Convert Another
                                            </Button>
                                        </div>
                                    </Card>
                                </div>

                                <div className="lg:col-span-2 space-y-6">
                                    <Card className="p-1 bg-slate-100 h-full flex flex-col">
                                        <div className="bg-white p-3 border-b border-slate-200 flex justify-between items-center px-6">
                                            <h3 className="font-semibold text-slate-700 flex items-center gap-2">
                                                <ImageIcon size={18} /> Preview
                                            </h3>
                                            {isConverting && (
                                                <span className="text-xs text-blue-600 font-medium animate-pulse flex items-center gap-1">
                                                    <RefreshCw size={12} className="animate-spin"/> Updating...
                                                </span>
                                            )}
                                        </div>

                                        <div className="flex-grow flex items-center justify-center p-6 min-h-[400px] overflow-auto bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
                                            {previewConverted ? (
                                                <div className="relative shadow-2xl rounded-sm overflow-hidden">
                                                    <img 
                                                        src={previewConverted} 
                                                        alt="Converted preview" 
                                                        className="max-w-full h-auto max-h-[600px] object-contain"
                                                    />
                                                    <div className="absolute top-4 right-4 bg-black/70 text-white text-xs px-2 py-1 rounded backdrop-blur-sm">
                                                        WebP Output
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center text-slate-400">
                                                    <RefreshCw size={40} className="animate-spin mb-4 text-slate-300"/>
                                                    <p>Generating preview...</p>
                                                </div>
                                            )}
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}

                        <div className="text-center text-slate-400 text-sm mt-12 pb-8">
                            <p className="flex items-center justify-center gap-1">
                                <AlertCircle size={14} /> 
                                All conversion happens locally. Your images never leave your device.
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
